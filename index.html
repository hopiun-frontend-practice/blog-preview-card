<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">
  
  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>
  <main>
    <div class="blog-card">
      <img class="blog-card__img" src="./assets/images/illustration-article.svg" alt="Blog card cover"/>
      <div class="blog-content">
        <div class="category_label">
          <h3 class="text-preset-bold" id="category-name">Learning</h3>
        </div>
        <span class="blog__publication-date">Published 21 Dec 2023</span>
        <h2 class="blog__title">HTML & CSS foundations</h2>
        <p class="blog__description">These languages are the backbone of every website, 
          defining structure, content, and presentation.</p>
      </div>
      <div class="author-info">
        <img class="author__img" src="./assets/images/image-avatar.webp" alt="Author's avatar"/>
        <h3 class="text-preset-bold" id="author__name">Greg Hooper</h3>
      </div>
    </div>
  </main>
</body>
</html>
